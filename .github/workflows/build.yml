name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install -g npm@latest
      - run: npm ci
      - name: 构建（失败日志写入 Job Summary）
        run: |
          set +e
          npm run build > /tmp/fe-build.log 2>&1
          code=$?
          if [ $code -ne 0 ]; then
            echo '## 前端构建失败日志' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -120 /tmp/fe-build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/fe-build.log
            exit $code
          fi
      - run: test -f dist/index.html

  backend:
    name: 后端构建与测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/email-notify-server ./cmd/server
      - name: 冒烟测试（本地假数据）
        run: |
          DEV_NOAUTH=1 CONFIG_DIR=/tmp/en-data /tmp/email-notify-server > /tmp/server.log 2>&1 &
          SRV=$!
          sleep 2
          curl -fsS http://127.0.0.1:8000/api/health | grep '"ok":true'
          curl -fsS http://127.0.0.1:8000/api/accounts
          kill $SRV

  package:
    name: 全量构建与 LPK 打包
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: npm install -g npm@latest
      - name: 执行 build.sh 全量构建（失败日志写入 Job Summary）
        run: |
          set +e
       