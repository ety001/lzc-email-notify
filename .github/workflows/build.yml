name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 环境信息
        run: |
          echo "## 环境" >> "$GITHUB_STEP_SUMMARY"
          echo "- node: $(node --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm: $(npm --version)" >> "$GITHUB_STEP_SUMMARY"
          node --version && npm --version
      - name: npm ci（失败日志写入 Job Summary）
        run: |
          set +e
          npm ci > /tmp/fe-ci.log 2>&1
          code=$?
          if [ $code -ne 0 ]; then
            echo '## npm ci 失败日志' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -120 /tmp/fe-ci.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/fe-ci.log
            exit $code
          fi
      - name: 构建（日志写入 Job Summary）
        run: |
          set +e
          npm run build > /tmp/fe-build.log 2>&1
          code=$?
          echo '## npm run build 输出' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -120 /tmp/fe-build.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ $code -ne 0 ]; then
            cat /tmp/fe-build.log
            exit $code
          fi
      - run: test -f dist/index.html

  backend:
    name: 后端构建与测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/email-notify-server ./cmd/server
      - name: 冒烟测试（本地假数据）
        run: |
          DEV_NOAUTH=1 CONFIG_DIR=/tmp/en-data /tmp/email-notify-server > /tmp/server.log 2>&1 &
          SRV=$!
          sleep 2
          curl -fsS http://127.0.0.1:8000/api/health | grep '"ok":true'
          curl -fsS http://127.0.0.1:8000/api/accounts
          kill $SRV

  package:
    name: 全量构建与 LPK 打包
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: 执行 build.sh 全量构建（日志写入 Job Summary）
        run: |
          set +e
          ./build.sh > /tmp/full-build.log 2>&1
          code=$?
          echo '## build.sh 输出' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -150 /tmp/full-build.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ $code -ne 0 ]; then
            cat /tmp/full-build.log
            exit $code
          fi
      - name: 校验 contentdir 产物
        run: |
          test -f build-out/email-notify-server
          test -f build-out/dist/index.html
          file build-out/email-notify-server | grep -i "statically linked"
      - name: 安装 lzc-cli 并打包 LPK
        env:
          BOX_NAME: ci
          BOX_UID: ci
        run: |
          npm install -g @lazycatcloud/lzc-cli
          lzc-cli project build -o email-notify.lpk
          ls -la *.lpk
      - uses: actions/upload-artifact@v4
        with:
          name: email-notify-lpk
          path: '*.lpk'
          retention-days: 14
